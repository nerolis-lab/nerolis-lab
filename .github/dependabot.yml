version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/common"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      patch-updates:
        update-types:
          - "patch"

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      patch-updates:
        update-types:
          - "patch"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      patch-updates:
        update-types:
          - "patch"

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      patch-updates:
        update-types:
          - "patch"

  - package-ecosystem: "npm"
    directory: "/guides"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      patch-updates:
        update-types:
          - "patch"
